<!doctype html><html><head></head><body><script type="application/ld+json">{
  "@context": "https://schema.org/",

  "title": "Software Engineer",
  "url": "https://www.ycombinator.com/companies/loombotic/jobs/7uV8QWw-software-engineer",
  "description": "\u003ch3\u003eAbout Loombotic\u003c/h3\u003e\n\u003cp\u003eLoombotic is automating the wire harness, the hand-built nervous system inside every robot, vehicle, and machine. It is one of the last big manufacturing processes still done almost entirely by hand, and we are changing that by building our own instant-quoting software and our own machines, shipping a custom harness in about a week instead of 6 to 12. Teams building robotics, aerospace, and advanced thermal and data-center hardware rely on us to get custom cables in days, not months.\u003c/p\u003e\n\u003cp\u003eSoftware is the core of why we're faster than traditional manufacturing - it runs everything from the instant quote a customer sees to the work instructions on the floor to the machines that build the harness.\u003c/p\u003e\n\u003ch3\u003eThe role\u003c/h3\u003e\n\u003cp\u003eYou'll be one of our first software hires, building the systems that make an automated harness factory run: the instant-quoting engine, the production/MES software technicians and machines work from, customer-facing tooling, and the data backbone tying it all together. This is a high-ownership generalist role - you'll ship features end-to-end, talk to the people on the floor and the customers using what you build, and have an outsized say in the architecture as we scale.\u003c/p\u003e\n\u003ch3\u003eProblems you'll get to solve\u003c/h3\u003e\n\u003cp\u003eA few of the problems you'd actually work on:\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eBuild a quoting engine that turns a customer's harness drawing or netlist into an accurate price and a buildable spec in seconds, instead of the days it takes the rest of the industry\u003c/li\u003e\n\u003cli\u003eModel a harness (wires, connectors, terminals, splices, branches) as data clean enough to drive quoting, the floor, and the machines from one source of truth\u003c/li\u003e\n\u003cli\u003eBuild the production software that tells technicians and machines exactly what to build, tracks every job, and never lets a wrong part or revision slip through\u003c/li\u003e\n\u003cli\u003eClose the loop with hardware: pull test results and machine data back in, and surface what's slow or breaking on the floor before it bites\u003c/li\u003e\n\u003cli\u003eMake all of it fast and reliable enough that a custom harness goes from order to shipped in about a week\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eWhat you'll do\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eBuild full-stack features across the quoting engine, production software, and internal tools\u003c/li\u003e\n\u003cli\u003eTurn harness drawings, BOMs, and pinouts into structured data that drives instant quotes and build instructions\u003c/li\u003e\n\u003cli\u003eIntegrate software with the shop floor and our automated equipment (job tracking, test results, machine data)\u003c/li\u003e\n\u003cli\u003eDesign schemas and data pipelines that keep quoting, production, inventory, and procurement in sync\u003c/li\u003e\n\u003cli\u003eWork directly with production, engineering, and customers to find the highest-leverage things to build\u003c/li\u003e\n\u003cli\u003eOwn quality, reliability, and iteration speed of what you ship\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eYou are\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eA strong full-stack generalist who ships quickly and takes end-to-end ownership\u003c/li\u003e\n\u003cli\u003eComfortable with ambiguity and an early-stage, fast-changing codebase\u003c/li\u003e\n\u003cli\u003eMotivated by real-world impact - you like that your code moves physical product out the door\u003c/li\u003e\n\u003cli\u003eA clear communicator who works well with non-software teammates on the floor\u003c/li\u003e\n\u003cli\u003eLow-ego, pragmatic, and always looking to make the system better\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eMinimum qualifications\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eA track record of building and shipping production software end-to-end. We hire on what you've built, not years on a resume: strong new grads through senior engineers are all welcome\u003c/li\u003e\n\u003cli\u003eCan quickly adapt to the ever-changing agentic coding meta\u003c/li\u003e\n\u003cli\u003eComfortable across a modern web stack and relational databases. We care that you can ship and won't screen on language (much of our stack is TypeScript, Vue, Python, and Postgres, but that's not a requirement)\u003c/li\u003e\n\u003cli\u003eComfortable owning a feature from data model to UI to deployment\u003c/li\u003e\n\u003cli\u003eAble to work on-site in Austin, TX (or relocate); exceptional Toronto-based candidates considered\u003c/li\u003e\n\u003cli\u003eLegally authorized to work in the U.S. or Canada\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eNice to have\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eExperience in manufacturing, hardware, robotics, supply chain, or other physical-world software\u003c/li\u003e\n\u003cli\u003eQuoting, pricing, CPQ, MES, ERP, or PLM systems\u003c/li\u003e\n\u003cli\u003eWorking with engineering drawings/BOMs\u003c/li\u003e\n\u003cli\u003eSupabase/Postgres at depth, cloud infra, or data pipelines\u003c/li\u003e\n\u003cli\u003eEarly-stage startup experience as an early engineer\u003c/li\u003e\n\u003cli\u003eBonus: serious Factorio (or other factory-builder game) playtime. If optimizing automated factories for fun sounds like you, you'll fit right in.\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eWhat we care about\u003c/h3\u003e\n\u003cp\u003eWe care about ownership and judgment over pedigree. The best engineer here finds the bottleneck that's actually slowing the factory down - the manual quoting step, the data that's out of sync, the report production keeps redoing by hand - and ships the thing that removes it. We want people who want to build the system, not just close tickets.\u003c/p\u003e\n\u003ch3\u003eCompensation \u0026amp; benefits\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003e$120k-$185k base + meaningful early-stage equity, wide by design. Equity by level: junior 0.1-0.25%, mid 0.25-0.5%, senior 0.5-1.0%, one of the first few engineers 0.75-1.5%\u003c/li\u003e\n\u003cli\u003eMedical, dental, and vision coverage\u003c/li\u003e\n\u003cli\u003ePaid time off and company holidays\u003c/li\u003e\n\u003cli\u003eTop-tier hardware and tools\u003c/li\u003e\n\u003cli\u003eAccess to our engineering lab and tools for approved personal projects. We like people who build things\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eHow to apply\u003c/h3\u003e\n\u003cp\u003eApply with your resume (and GitHub/portfolio if you have one) and short answers to:\u003c/p\u003e\n\u003col\u003e\n\u003cli\u003eWhat's something you built and shipped end-to-end? What did you own?\u003c/li\u003e\n\u003cli\u003eTell us about a time you built software that had to survive messy real-world constraints (physical hardware, manufacturing, logistics, ground-truth data, or similar). Pick the messiest example you've got, whatever the domain.\u003c/li\u003e\n\u003cli\u003eWhy Loombotic / why an early factory-software role?\u003c/li\u003e\n\u003c/ol\u003e\n\u003cp\u003e\u003cem\u003eLoombotic is an equal opportunity employer. We consider all qualified applicants without regard to race, color, religion, sex, sexual orientation, gender identity, national origin, age, disability, veteran status, or any other protected characteristic. We provide reasonable accommodations for applicants with disabilities; if you need one during the hiring process, just ask.\u003c/em\u003e\u003c/p\u003e\n",

uot;:&quot;### About Loombotic\n\nLoombotic is automating the wire harness, the hand-built nervous system inside every robot, vehicle, and machine. It is one of the last big manufacturing processes still done almost entirely by hand, and we are changing that by building our own instant-quoting software and our own machines, shipping a custom harness in about a week instead of 6 to 12. Teams building robotics, aerospace, and advanced thermal and data-center hardware rely on us to get custom cables in days, not months.\n\nSoftware is the core of why we&#x27;re faster than traditional manufacturing - it runs everything from the instant quote a customer sees to the work instructions on the floor to the machines that build the harness.\n\n### The role\n\nYou&#x27;ll be one of our first software hires, building the systems that make an automated harness factory run: the instant-quoting engine, the production/MES software technicians and machines work from, customer-facing tooling, and the data backbone tying it all together. This is a high-ownership generalist role - you&#x27;ll ship features end-to-end, talk to the people on the floor and the customers using what you build, and have an outsized say in the architecture as we scale.\n\n### Problems you&#x27;ll get to solve\n\nA few of the problems you&#x27;d actually work on:\n\n* Build a quoting engine that turns a customer&#x27;s harness drawing or netlist into an accurate price and a buildable spec in seconds, instead of the days it takes the rest of the industry\n* Model a harness (wires, connectors, terminals, splices, branches) as data clean enough to drive quoting, the floor, and the machines from one source of truth\n* Build the production software that tells technicians and machines exactly what to build, tracks every job, and never lets a wrong part or revision slip through\n* Close the loop with hardware: pull test results and machine data back in, and surface what&#x27;s slow or breaking on the floor before it bites\n* Make all of it fast and reliable enough that a custom harness goes from order to shipped in about a week\n\n### What you&#x27;ll do\n\n* Build full-stack features across the quoting engine, production software, and internal tools\n* Turn harness drawings, BOMs, and pinouts into structured data that drives instant quotes and build instructions\n* Integrate software with the shop floor and our automated equipment (job tracking, test results, machine data)\n* Design schemas and data pipelines that keep quoting, production, inventory, and procurement in sync\n* Work directly with production, engineering, and customers to find the highest-leverage things to build\n* Own quality, reliability, and iteration speed of what you ship\n\n### You are\n\n* A strong full-stack generalist who ships quickly and takes end-to-end ownership\n* Comfortable with ambiguity and an early-stage, fast-changing codebase\n* Motivated by real-world impact - you like that your code moves physical product out the door\n* A clear communicator who works well with non-software teammates on the floor\n* Low-ego, pragmatic, and always looking to make the system better\n\n### Minimum qualifications\n\n* A track record of building and shipping production software end-to-end. We hire on what you&#x27;ve built, not years on a resume: strong new grads through senior engineers are all welcome\n* Can quickly adapt to the ever-changing agentic coding meta\n* Comfortable across a modern web stack and relational databases. We care that you can ship and won&#x27;t screen on language (much of our stack is TypeScript, Vue, Python, and Postgres, but that&#x27;s not a requirement)\n* Comfortable owning a feature from data model to UI to deployment\n* Able to work on-site in Austin, TX (or relocate); exceptional Toronto-based candidates considered\n* Legally authorized to work in the U.S. or Canada\n\n### Nice to have\n\n* Experience in manufacturing, hardware, robotics, supply chain, or other physical-world software\n* Quoting, pricing, CPQ, MES, ERP, or PLM systems\n* Working with engineering drawings/BOMs\n* Supabase/Postgres at depth, cloud infra, or data pipelines\n* Early-stage startup experience as an early engineer\n* Bonus: serious Factorio (or other factory-builder game) playtime. If optimizing automated factories for fun sounds like you, you&#x27;ll fit right in.\n\n### What we care about\n\nWe care about ownership and judgment over pedigree. The best engineer here finds the bottleneck that&#x27;s actually slowing the factory down - the manual quoting step, the data that&#x27;s out of sync, the report production keeps redoing by hand - and ships the thing that removes it. We want people who want to build the system, not just close tickets.\n\n### Compensation &amp;amp; benefits\n\n* $120k-$185k base + meaningful early-stage equity, wide by design. Equity by level: junior 0.1-0.25%, mid 0.25-0.5%, senior 0.5-1.0%, one of the first few engineers 0.75-1.5%\n* Medical, dental, and vision coverage\n* Paid time off and company holidays\n* Top-tier hardware and tools\n* Access to our engineering lab and tools for approved personal projects. We like people who build things\n\n### How to apply\n\nApply with your resume (and GitHub/portfolio if you have one) and short answers to:\n\n1. What&#x27;s something you built and shipped end-to-end? What did you own?\n2. Tell us about a time you built software that had to survive messy real-world constraints (physical hardware, manufacturing, logistics, ground-truth data, or similar). Pick the messiest example you&#x27;ve got, whatever the domain.\n3. Why Loombotic / why an early factory-software role?\n\n_Loombotic is an equal opportunity employer. We consider all qualified applicants without regard to race, color, religion, sex, sexual orientation, gender identity, national origin, age, disability, veteran status, or any other protected characteristic. We provide reasonable accommodations for applicants with disabilities; if
