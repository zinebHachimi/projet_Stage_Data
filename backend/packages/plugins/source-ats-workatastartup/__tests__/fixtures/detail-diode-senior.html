  "description": "\u003cp\u003eDiode Computers, Inc. is looking for a senior software engineer to help us fix circuit board design and manufacturing.\u003c/p\u003e\n\u003cp\u003eThe team has shipped real hardware at Apple, Anduril, and several med-tech startups; now we’re focusing our attention on helping others build hardware better. We’ve raised $14M and were featured on the a16z \u003ca href=\"https://a16z.com/american-dynamism-50-2025/\"\u003e“American Dynamism 50”\u003c/a\u003e list this year. Our customers include some of the biggest names in robotics, health-tech, and defense.\u003c/p\u003e\n\u003cp\u003eSince we make software for hardware, you'll learn lots about the world of building physical things, even if you haven't tinkered with electronics before. You'll quickly pick up the basics of electrical engineering and PCB design, and we expect you to bring a strong software-first lens as we build tools for our customers and in-house EE team.\u003c/p\u003e\n\u003cp\u003eWe work in a fast, engineering-driven culture. We iterate on ideas quickly, and expect you to take ownership over what you build. You'll make decisions on everything from technical implementation to UX, and drive projects through from idea to production.\u003c/p\u003e\n\u003ch3\u003eWhat you'll do\u003c/h3\u003e\n\u003cp\u003eWe move fast, so expect each week to look a little different than the last. That said, here’s a sampling of projects we have/will work on, to give you a taste for the kinds of problems we think about.\u003c/p\u003e\n\u003cul\u003e\n\u003cli\u003eDesigning a programming language for PCB schematics that is intuitive for both humans and LLMs to read and write\u003c/li\u003e\n\u003cli\u003eRust compiler and CLI build tool for compiling schematics and interacting with the rest of our infrastructure\u003c/li\u003e\n\u003cli\u003eAPI integrations with PCB fabs for real-time quoting and ordering\u003c/li\u003e\n\u003cli\u003eConstraint-based layout algorithm for automatically arranging components on a PCB\u003c/li\u003e\n\u003cli\u003eAuto-generated electrical schematics visualization\u003c/li\u003e\n\u003cli\u003eAI agents to automate various steps of the design process, building on our bespoke tooling\u003c/li\u003e\n\u003cli\u003eCollaborate with our in-house EE team to ruthlessly optimize their workflow\u003c/li\u003e\n\u003cli\u003eContribute to \u003ca href=\"https://github.com/diodeinc\"\u003eopen source\u003c/a\u003e libraries, and publish our own (more here soon)\u003c/li\u003e\n\u003c/ul\u003e\n\u003cp\u003eWe work mostly in Rust and TypeScript.\u003c/p\u003e\n\u003ch3\u003eWhat you'll need\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eA few years of experience with at least one of {Rust, Python, TypeScript}\u003c/li\u003e\n\u003cli\u003eSome prior experience owning large parts of a technical project\u003c/li\u003e\n\u003cli\u003eExcitement to work hard on hard technical problems\u003c/li\u003e\n\u003cli\u003eThe ability to work from our office in NYC, ~5 days a week\u003c/li\u003e\n\u003cli\u003eBonus points:\n\u003cul\u003e\n\u003cli\u003eYou've tinkered with hardware before (even small hobby projects). If not, you’ll learn on the job!\u003c/li\u003e\n\u003cli\u003eExperience with building robust AI tools (agents, evals, the whole shebang)\u003c/li\u003e\n\u003c/ul\u003e\n\u003c/li\u003e\n\u003c/ul\u003e\n\u003ch3\u003eWhat you'll get\u003c/h3\u003e\n\u003cul\u003e\n\u003cli\u003eA competitive salary and equity grant\u003c/li\u003e\n\u003cli\u003eFree food and the occasional team offsite\u003c/li\u003e\n\u003cli\u003eGreat healthcare (incl. vision, dental), PTO, and other benefits\u003c/li\u003e\n\u003cli\u003eRelocation support to NYC, if you need it\u003c/li\u003e\n\u003c/ul\u003e\n",

  "interview_process": "\u003col\u003e\n\u003cli\u003e30 min chat with founder(s): We’ll tell you more about our company and backgrounds, and you’ll tell us a bit about what you’re looking for.\u003c/li\u003e\n\u003cli\u003e1-2 technical interviews with team: We want to see how you approach problems. You’ll get an open-ended technical problem and we’ll work together to implement a solution. You’ll screen share and use whatever tools or codegen you want: the idea is to simulate how we work together in practice.\u003c/li\u003e\n\u003cli\u003e3-5 day paid work trial in NYC: You’ll spend a few days with us in NYC and we’ll pay you for your time. We want you to get to know our working styles, and to get to know yours. (We can be flexible and work around your schedule here.)\u003c/li\u003e\n\u003cli\u003eReferences + offer: We’ll ask for a couple references and then give you an offer. If you’re moving to NYC, we’ll cover your expenses and help you find a place, if you need it.\u003c/li\u003e\n\u003c/ol\u003e\n",

. That said, here’s a sampling of projects we have/will work on, to give you a taste for the kinds of problems we think about.\n\n* Designing a programming language for PCB schematics that is intuitive for both humans and LLMs to read and write\n* Rust compiler and CLI build tool for compiling schematics and interacting with the rest of our infrastructure\n* API integrations with PCB fabs for real-time quoting and ordering\n* Constraint-based layout algorithm for automatically arranging components on a PCB\n* Auto-generated electrical schematics visualization\n* AI agents to automate various steps of the design process, building on our bespoke tooling\n* Collaborate with our in-house EE team to ruthlessly optimize their workflow\n* Contribute to [open source](https://github.com/diodeinc) libraries, and publish our own (more here soon)\n\nWe work mostly in Rust and TypeScript.\n\n### What you&#x27;ll need\n\n* A few years of experience with at least one of {Rust, Python, TypeScript}\n* Some prior experience owning large parts of a technical project\n* Excitement to work hard on hard technical problems\n* The ability to work from our office in NYC, \\~5 days a week\n* Bonus points:\n  * You&#x27;ve tinkered with hardware before (even small hobby projects). If not, you’ll learn on the job!\n  * Experience with building robust AI tools (agents, evals, the whole shebang)\n\n### What you&#x27;ll get\n\n* A competitive salary and equity grant\n* Free food and the occasional team offsite\n* Great healthcare (incl. vision, dental), PTO, and other benefits\n* Relocation support to NYC, if you need it&quot;,&quot;interview_process&quot;:&quot;1. 30 min chat with founder(s): We’ll tell you more about our company and backgrounds, and you’ll tell us a bit about what you’re looking for.\r\n2. 1-2 technical interviews with team: We want to see how you approach problems. You’ll get an open-ended technical problem and we’ll work together to implement a solution. You’ll screen share and use whatever tools or codegen you want: the idea is to simulate how we work together in practice.\r\n3. 3-5 day paid work trial in NYC: You’ll spend a few days with us in NYC and we’ll pay you for your time. We want you to get to know our working styles, and to get to know yours. (We can be flexible and work around your schedule here.)\r\n4. References + offer: We’ll ask for a couple references and then give you an offer. If you’re moving to NYC, we’ll cover your expenses and help you find a place, if you need it.&quot;},&quot;relatedJobs&quot;:[{&quot;id&quot;:93286,&quot;title&quot;:&quot;Software Engineer - UI&quot;,&quot;url&quot;:&quot;/companies/pasito/jobs/bGiw1dQ-software-engineer-ui&quot;,&quot;applyUrl&quot;:&quot;https://account.ycombinator.com/authenticate?continue=https%3A%2F%2Fwww.workatastartup.com%2Fapplication%3Fsignup_job_id%3D93286&amp;defaults%5BsignUpActive%5D=true&amp;defaults%5Bwaas_company%5D=29851&quot;,&quot;location&quot;:&quot;US / AR / BR / CO / MX / Remote (US; AR; BR; CO; MX)&quot;,&quot;askUs&quot;:true,&quot;type&quot;:&quot;Full-time&quot;,&quot;role&quot;:&quot;eng&quot;,&quot;roleSpecificType&quot;:&quot;Full stack&quot;,&quot;prettyRole&quot;:&quot;Engineering&quot;,&quot;salaryRange&quot;:&quot;$140K - $170K&quot;,&quot;equityRange&quot;:&quot;0.05% - 0.15%&quot;,&quot;minExperience&quot;:&quot;3+ years&quot;,&quot;minSchoolYear&quot;:null,&quot;visa&quot;:&quot;US citizen/visa only&quot;,&quot;skills&quot;:[&quot;CSS&quot;,&quot;Node.js&quot;,&quot;React&quot;,&quot;Next.js&quot;],&quot;isIncomplete&quot;:false,&quot;companyUrl&quot;:&quot;/companies/pasito&quot;,&quot;companyLogoUrl&quot;:&quot;https://bookface-images.s3.amazonaws.com/small_logos/99d6144bd15df315cd76d735be86467d893d772a.png&quot;,&quot;companyName&quot;:&quot;Pasito&quot;,&quot;companyBatchName&quot;:&quot;S22&quot;,&quot;companyOneLiner&quot;:&quot;AI agents for insurance and benefits&quot;,&quot;hiringManager&quot;:null,&quot;createdAt&quot;:&quot;2 month
