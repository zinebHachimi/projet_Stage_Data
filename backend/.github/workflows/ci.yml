name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  docs-lint:
    name: Docs Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run docs-lint
        run: npm run lint:docs

      - name: Run docs-lint unit tests
        run: npx jest --testPathPatterns 'scripts/__tests__/docs-lint' --verbose

  build:
    name: Build & Type-Check
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --project apps/api/tsconfig.build.json --noEmit

      - name: Build API
        run: npx nest build

      - name: Verify dist output
        run: |
          test -f dist/apps/api/main.js || { echo "main.js not found in dist"; exit 1; }
          echo "dist output verified"

      - name: Build CLI
        run: npx nest build cli

  test-fast:
    name: Test (Health & Smoke)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run health endpoint tests
        run: npx jest --testPathPatterns 'apps/api/__tests__/health' --verbose

  test-e2e:
    name: Test (E2E - Live APIs)
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API search & analyze E2E tests
        run: npx jest --testPathPatterns 'apps/api/__tests__/(search|analyze)' --verbose
        continue-on-error: true

      - name: Run CLI E2E tests
        run: npx jest --testPathPatterns 'apps/cli/__tests__' --verbose
        continue-on-error: true

  test-sources:
    name: Test (Source Scrapers)
    runs-on: ubuntu-latest
    needs: build
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run source scraper tests
        run: npx jest --testPathPatterns 'packages/plugins/source-' --passWithNoTests --verbose
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}

  test-feature-plugins:
    name: Test (Feature Plugins)
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Hermetic offline suites (no live APIs) — these gate the build.
      # Perf budgets are relaxed for shared-runner variance via the suites'
      # documented env overrides (Spec 722 / FR-9, D-5): local defaults stay
      # strict (250 ms / 2 500 ms); CI ceilings still catch the 24x-over
      # class of regression these gates exist for.
      - name: Run feature plugin tests
        run: npx jest --testPathPatterns 'packages/plugins/(dedup-hybrid|merge-default|store-memory|liveness-http)/' --verbose
        env:
          DEDUP_PERF_NFR1_MS: '1000'
          DEDUP_PERF_NFR2_MS: '8000'

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t ever-jobs-api:ci .

      - name: Verify Docker health
        run: |
          docker run -d --name ever-jobs-test -p 3001:3001 ever-jobs-api:ci
          sleep 10
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health || true)
          docker logs ever-jobs-test
          docker stop ever-jobs-test
          docker rm ever-jobs-test
          if [ "$STATUS" = "200" ]; then
            echo "Health check passed (HTTP $STATUS)"
          else
            echo "Health check failed (HTTP $STATUS)"
            exit 1
          fi
