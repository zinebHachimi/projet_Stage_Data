# Development override — extends docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
version: "3.8"

services:
  ever-jobs-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder   # Use the builder stage (has devDependencies)
    container_name: ever-jobs-api-dev
    ports:
      - "${PORT:-3001}:3001"
    env_file:
      - .env
    environment:
      NODE_ENV: development
      PORT: 3001
      LOG_LEVEL: debug

      # Enable security features for dev testing
      ENABLE_API_KEY_AUTH: ${ENABLE_API_KEY_AUTH:-true}
      API_KEYS: ${API_KEYS:-dev-api-key-12345}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-50}
      RATE_LIMIT_TIMEFRAME: ${RATE_LIMIT_TIMEFRAME:-60}
      ENABLE_CACHE: ${ENABLE_CACHE:-true}
      CACHE_EXPIRY: ${CACHE_EXPIRY:-300}
    volumes:
      # Mount source for hot-reload
      - .:/app
      - /app/node_modules
    command: ["npx", "ts-node-dev", "--respawn", "--transpile-only", "apps/api/src/main.ts"]
    restart: unless-stopped
