# Ever Jobs — INTERNAL deployment on do-sfo2-k8s-gauzy. ClusterIP only, NO Ingress:
# the API is reachable only inside the cluster (Hust's pods call it at
# http://ever-jobs-api.default.svc.cluster.local:3001). Not exposed to the public internet.
#
# Image ghcr.io/ever-jobs/ever-jobs:latest (built by docker-build-publish.yml).
---
kind: Service
apiVersion: v1
metadata:
  name: ever-jobs-api
  labels:
    app: ever-jobs-api
spec:
  type: ClusterIP
  selector:
    app: ever-jobs-api
  ports:
    - name: http
      protocol: TCP
      port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ever-jobs-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ever-jobs-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ever-jobs-api
    spec:
      containers:
        - name: ever-jobs-api
          image: ghcr.io/ever-jobs/ever-jobs:latest
          imagePullPolicy: Always
          command: ["node", "dist/apps/api/main.js"]
          ports:
            - containerPort: 3001
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            # Raise V8 heap — aggregating 160+ sources per search builds a large heap.
            - name: NODE_OPTIONS
              value: "--max-old-space-size=3584"
            # Cluster-internal only (ClusterIP, no ingress) → no API-key auth / rate limit needed.
            - name: ENABLE_API_KEY_AUTH
              value: "false"
            - name: RATE_LIMIT_ENABLED
              value: "false"
            - name: ENABLE_CACHE
              value: "true"
            - name: LOG_LEVEL
              value: "info"
            - name: CORS_ORIGINS
              value: "*"
          resources:
            requests:
              cpu: "200m"
              memory: "1Gi"
            # Aggregating 160+ sources builds a large V8 heap — generous ceiling (matches NODE_OPTIONS).
            limits:
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
      # GHCR package ghcr.io/ever-jobs/ever-jobs is public — no imagePullSecret needed.
---
# Ever Jobs MCP server — INTERNAL only (ClusterIP, no Ingress). Streamable-HTTP transport;
# reachable inside the cluster at http://ever-jobs-mcp.default.svc.cluster.local:3002/mcp.
kind: Service
apiVersion: v1
metadata:
  name: ever-jobs-mcp
  labels:
    app: ever-jobs-mcp
spec:
  type: ClusterIP
  selector:
    app: ever-jobs-mcp
  ports:
    - name: http
      protocol: TCP
      port: 3002
      targetPort: 3002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ever-jobs-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ever-jobs-mcp
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: ever-jobs-mcp
    spec:
      containers:
        - name: ever-jobs-mcp
          image: ghcr.io/ever-jobs/ever-jobs-mcp:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3002
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "production"
            - name: MCP_TRANSPORT
              value: "http"
            - name: PORT
              value: "3002"
            # The MCP proxies to the internal Ever Jobs API over the cluster network.
            - name: EVER_JOBS_API_URL
              value: "http://ever-jobs-api.default.svc.cluster.local:3001"
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 8
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
